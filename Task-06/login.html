<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laundry Login</title>
<link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-container row"> 
        <!-- Left Image Section -->
        <div class="left-column">
            <img src="images/2306.i518.020.S.m005.c13.realistic washing machine.jpg" alt="laundry">
        </div>
        <!-- Right Login Section -->
        <div class="right-column">
            <h2>Hello Again!</h2>
            <p class="subtitle">Welcome back! we missed you!</p>
            <form>
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Emailid@site.com" autocomplete="off"/>
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Password"/>
                <div class="forgot">
                    <a href="#">Forgot Password</a>
                </div>
                <button class="login-btn">Login</button>
                <p class="register">
                    Not a member? <a href="#">Register Now</a>
                </p>
            </form>
        </div>
    </div>
</body>
</html>
